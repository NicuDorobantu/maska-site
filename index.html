<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASKA.ro</title>
    <style>
        body { background-color: #000; color: #fff; margin: 0; font-family: sans-serif; text-align: center; }
        header { padding: 80px 20px; border-bottom: 1px solid #d4af37; }
        h1 { color: #d4af37; font-size: 50px; letter-spacing: 15px; margin: 0; }
        .slogan { color: #d4af37; font-size: 12px; letter-spacing: 5px; margin-top: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px; }
        .card { width: 300px; border: 1px solid #222; background: #050505; padding-bottom: 20px; }
        .img-box { width: 100%; height: 350px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        h2 { color: #d4af37; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }
        p { color: #888; font-size: 12px; padding: 0 15px; height: 50px; }
        footer { padding: 60px; border-top: 1px solid #222; color: #d4af37; font-size: 12px; }
    </style>
</head>
<body>
    <header>
        <h1>MASKA</h1>
        <div class="slogan">MAGAZIN FIZIC . CONCEPT PREMIUM</div>
    </header>
    <div class="container">
        <div class="card">
            <div class="img-box"><img src="https://images.unsplash.com/photo-1614030424754-24d9e9652077?w=500"></div>
            <h2>Carnaval</h2>
            <p>Masti venetiene lucrate manual pentru evenimente de lux.</p>
        </div>
        <div class="card">
            <div class="img-box"><img src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=500"></div>
            <h2>Halloween</h2>
            <p>Masti horror din latex cu design realist.</p>
        </div>
        <div class="card">
            <div class="img-box"><img src="https://images.unsplash.com/photo-1460661419201-fd4ce18a802f?w=500"></div>
            <h2>DIY</h2>
            <p>Masti albe gata pentru pictat si personalizat.</p>
        </div>
    </div>
    <footer>
        <div>MASKA CONCEPT STORE - DESCHIDEM IN CURAND</div>
        <p>&copy; 2026 MASKA.RO</p>
    </footer>
</body>
</html>
