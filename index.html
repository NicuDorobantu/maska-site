<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASKA.ro | Magazin Concept Masti Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* RESET SI FONDTURI */
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }

        /* HEADER SI LOGO */
        header { 
            padding: 120px 20px; 
            text-align: center; 
            background: linear-gradient(to bottom, #0a0a0a, #000);
            border-bottom: 1px solid #d4af37; 
        }
        .logo { 
            font-family: 'Cinzel', serif; 
            font-size: clamp(40px, 8vw, 75px); 
            color: #d4af37; 
            letter-spacing: 25px; 
            text-transform: uppercase; 
            margin: 0; 
            font-weight: 700;
        }
        .slogan { 
            font-size: 11px; 
            color: #d4af37; 
            letter-spacing: 6px; 
            margin-top: 30px; 
            font-weight: 300; 
            text-transform: uppercase;
        }

        /* GRID CATEGORII */
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 40px; 
            padding: 80px 20px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        .card { 
            width: 380px; 
            background: #050505; 
            border: 1px solid #1a1a1a; 
            transition: all 0.4s ease; 
            display: flex; 
            flex-direction: column; 
        }
        .card:hover { 
            border-color: #d4af37; 
            transform: translateY(-10px); 
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }
        
        /* IMAGINI REPREZENTATIVE */
        .img-box { 
            width: 100%; 
            height: 480px; 
            overflow: hidden; 
            background: #000;
        }
        .img-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: grayscale(20%);
            transition: 0.5s;
        }
        .card:hover img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        /* TEXT SI DESCRIERI */
        .info { 
            padding: 35px 25px; 
            text-align: center; 
        }
        .info h2 { 
            font-family: 'Cinzel', serif; 
            color: #d4af37; 
            font-size: 17px; 
            letter-spacing: 3px; 
            margin: 0 0 15px 0; 
            text-transform: uppercase;
        }
        .info p { 
            color: #888; 
            font-size: 13px; 
            line-height: 1.7; 
            height: 70px; 
            margin-bottom: 25px;
            font-weight: 300;
        }
        .btn { 
            display: inline-block; 
            padding: 12px 30px; 
            border: 1px solid #d4af37; 
            color: #d4af37; 
            text-decoration: none; 
            font-size: 10px; 
            letter-spacing: 3px; 
            transition: 0.3s;
        }
        .btn:hover {
            background: #d4af37;
            color: #000;
        }
